name: Windows Build and Release

on:
  push:
    branches:
      - main
      - m5stack-dev
    tags:
      - "v*"
      - "m5stack-v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: MinSizeRel
  BUILD_DIR: build/windows
  QT_VERSION: "6.9.0"

jobs:
  windows:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 6.9 (MinGW)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          tools: tools_mingw1310

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Setup MinGW from Qt Tools
        id: mingw
        shell: pwsh
        run: |
          # Find the MinGW bin directory installed by install-qt-action
          $toolsDir = "$env:IQTA_TOOLS"
          Write-Host "IQTA_TOOLS: $toolsDir"
          $mingwBin = Get-ChildItem "$toolsDir" -Recurse -Directory -Filter "bin" |
            Where-Object { Test-Path "$($_.FullName)\g++.exe" } |
            Select-Object -First 1
          if (-not $mingwBin) {
            Write-Host "Listing tools directory:"
            Get-ChildItem "$toolsDir" -Recurse -Depth 2
            throw "Could not find MinGW bin directory in Qt tools"
          }
          $mingwRoot = Split-Path $mingwBin.FullName -Parent
          Write-Host "MinGW root: $mingwRoot"
          Write-Host "MinGW bin: $($mingwBin.FullName)"
          echo "$($mingwBin.FullName)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          echo "MINGW_ROOT=$mingwRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -S src -B $env:BUILD_DIR -G "Ninja" `
            -DCMAKE_BUILD_TYPE="$env:BUILD_TYPE" `
            -DCMAKE_C_COMPILER=gcc `
            -DCMAKE_CXX_COMPILER=g++ `
            -DMINGW64_ROOT="$env:MINGW_ROOT" `
            -DENABLE_INNO_INSTALLER=ON `
            -DENABLE_CHECK_VERSION=OFF `
            -DENABLE_TELEMETRY=OFF `
            -DIMAGER_SIGNED_APP=OFF

      - name: Build installer
        shell: pwsh
        run: cmake --build $env:BUILD_DIR --target inno_installer --parallel 2

      - name: Collect artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force dist | Out-Null

          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME
          } else {
            $version = (git describe --tags --dirty --always)
          }
          $version = $version -replace '^v', ''

          $installer = Get-ChildItem "$env:GITHUB_WORKSPACE\$env:BUILD_DIR\installer" -Filter "*.exe" |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $installer) {
            throw "No Windows installer was produced"
          }

          Copy-Item $installer.FullName "dist\M5Stack-Imager-$version-windows-x64-installer.exe"
          Compress-Archive -Path "$env:GITHUB_WORKSPACE\$env:BUILD_DIR\deploy\*" `
            -DestinationPath "dist\M5Stack-Imager-$version-windows-x64-portable.zip" `
            -Force
          Get-ChildItem dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5stack-imager-windows-x64
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = "${{ github.ref_name }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --title "M5Stack Imager $tag" `
              --notes "Automated build for $tag."
          }
          gh release upload $tag dist/* --clobber
