name: Linux Build and Release

on:
  push:
    branches:
      - main
      - m5stack-dev
    tags:
      - "v*"
      - "m5stack-v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  BUILD_TYPE: MinSizeRel
  QT_VERSION: "6.9.0"

jobs:
  linux-x64:
    name: Linux x64
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 6.9
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git \
            libgnutls28-dev libidn2-dev nettle-dev \
            libcurl4-openssl-dev libssl-dev \
            libudev-dev libusb-1.0-0-dev \
            liburing-dev \
            libgl-dev libegl-dev \
            libdbus-1-dev \
            libfuse2 \
            util-linux

      - name: Build AppImage
        run: |
          chmod +x create-appimage.sh
          ./create-appimage.sh --arch=x86_64 --qt-root="$QT_ROOT_DIR"

      - name: Collect artifacts
        run: |
          mkdir -p dist

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          version="${version#v}"

          APPIMAGE=$(find . -maxdepth 1 -name "*x86_64.AppImage" ! -type l | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: No AppImage produced"
            find . -name "*.AppImage" -maxdepth 1
            exit 1
          fi

          cp "$APPIMAGE" "dist/M5Stack-Imager-${version}-linux-x64.AppImage"
          ls -lh dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5stack-imager-linux-x64
          path: dist/*
          if-no-files-found: error

  linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Qt 6.9
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux_arm64
          target: desktop
          arch: linux_gcc_arm64

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ninja-build git \
            libgnutls28-dev libidn2-dev nettle-dev \
            libcurl4-openssl-dev libssl-dev \
            libudev-dev libusb-1.0-0-dev \
            liburing-dev \
            libgl-dev libegl-dev \
            libdbus-1-dev \
            libfuse2 \
            util-linux

      - name: Build AppImage
        run: |
          chmod +x create-appimage.sh
          ./create-appimage.sh --arch=aarch64 --qt-root="$QT_ROOT_DIR"

      - name: Collect artifacts
        run: |
          mkdir -p dist

          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            version="${GITHUB_REF_NAME}"
          else
            version="$(git describe --tags --dirty --always)"
          fi
          version="${version#v}"

          APPIMAGE=$(find . -maxdepth 1 -name "*aarch64.AppImage" ! -type l | head -1)
          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: No AppImage produced"
            find . -name "*.AppImage" -maxdepth 1
            exit 1
          fi

          cp "$APPIMAGE" "dist/M5Stack-Imager-${version}-linux-arm64.AppImage"
          ls -lh dist/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: m5stack-imager-linux-arm64
          path: dist/*
          if-no-files-found: error
